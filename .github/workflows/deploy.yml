name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dapps
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dapps/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          VITE_EVE_WORLD_PACKAGE_ID: "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
          VITE_AMM_ORIGINAL_PACKAGE_ID: "0x84c5a10c4d570849d04f01ebcb1f8255affd0eb97209e36f1badaea989941483"
          VITE_AMM_PACKAGE_ID: "0x84c5a10c4d570849d04f01ebcb1f8255affd0eb97209e36f1badaea989941483"
          VITE_SUI_GRAPHQL_ENDPOINT: "https://graphql.testnet.sui.io/graphql"
          VITE_APP_TITLE: "VOID EXCHANGE // EVE FRONTIER"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dapps/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
