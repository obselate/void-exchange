name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # The repo is now a pnpm workspace; the dapp shares @mysten/sui with
      # the root via hoisted `node_modules/`. Install at the root, then
      # build the dapp with `--filter`.
      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter ./dapps build
        env:
          VITE_EVE_WORLD_PACKAGE_ID: "0x28b497559d65ab320d9da4613bf2498d5946b2c0ae3597ccfda3072ce127448c"
          # AMM package IDs and the registry's shared object ref need to be
          # updated *together* whenever the amm_extension package is
          # republished — module init creates a fresh AMMRegistry per
          # publish. After `sui client publish`, run
          # `sui client object <registry-id>` to read its
          # initial_shared_version and update both VITE_AMM_REGISTRY_*
          # entries below.
          VITE_AMM_ORIGINAL_PACKAGE_ID: "0x84c5a10c4d570849d04f01ebcb1f8255affd0eb97209e36f1badaea989941483"
          VITE_AMM_PACKAGE_ID: "0x84c5a10c4d570849d04f01ebcb1f8255affd0eb97209e36f1badaea989941483"
          VITE_AMM_REGISTRY_ID: ""
          VITE_AMM_REGISTRY_INITIAL_SHARED_VERSION: "0"
          VITE_SUI_GRAPHQL_ENDPOINT: "https://graphql.testnet.sui.io/graphql"
          VITE_APP_TITLE: "VOID EXCHANGE // EVE FRONTIER"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dapps/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
