name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A single Sui CLI version is the source of truth for both lint and test jobs
# (they target Move packages under move-contracts/). Bump deliberately and
# regenerate bindings + re-run tests when changing.
env:
  SUI_RELEASE_TAG: mainnet-v1.70.2
  # Tag of evefrontier/world-contracts that void-exchange's Move packages
  # depend on. Mirrored from docs/builder-flow-host.md, where humans clone
  # the same tag manually as a sibling directory.
  WORLD_CONTRACTS_REF: v0.0.18

jobs:
  move:
    name: Move (lint + test)
    runs-on: ubuntu-latest
    steps:
      # Both repos must live as siblings because Move.toml references
      # `local = "../../../world-contracts/contracts/world"`. We restructure
      # the workspace into:
      #   $GITHUB_WORKSPACE/void-exchange       (this repo)
      #   $GITHUB_WORKSPACE/world-contracts     (dependency)
      - name: Checkout void-exchange
        uses: actions/checkout@v4
        with:
          path: void-exchange

      - name: Checkout world-contracts
        uses: actions/checkout@v4
        with:
          repository: evefrontier/world-contracts
          ref: ${{ env.WORLD_CONTRACTS_REF }}
          path: world-contracts

      # Install the pinned `sui` CLI from the official release tarball.
      # We avoid third-party setup actions to keep the supply chain narrow.
      - name: Install Sui CLI
        run: |
          set -euo pipefail
          tarball="sui-${SUI_RELEASE_TAG}-ubuntu-x86_64.tgz"
          curl -fsSL -o "$tarball" \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_RELEASE_TAG}/${tarball}"
          mkdir -p "$HOME/.sui-bin"
          tar -xzf "$tarball" -C "$HOME/.sui-bin"
          echo "$HOME/.sui-bin" >> "$GITHUB_PATH"

      - name: Verify Sui CLI
        run: sui --version

      - name: Move lint
        working-directory: void-exchange
        run: sh scripts/lint-move.sh

      - name: Move test
        working-directory: void-exchange
        run: sh scripts/test-move.sh

  typescript:
    name: TypeScript (typecheck + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm fmt:check

      - name: Typecheck
        run: pnpm typecheck
