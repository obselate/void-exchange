name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A single Sui CLI version is the source of truth for the move and codegen
# jobs (they target Move packages under move-contracts/). Bump deliberately:
# regenerate bindings (`pnpm codegen`) and re-run Move tests after changing.
env:
  SUI_RELEASE_TAG: mainnet-v1.70.2
  # Tag of evefrontier/world-contracts that void-exchange's Move packages
  # depend on. Mirrored from docs/development.md, where humans clone the
  # same tag manually as a sibling directory.
  WORLD_CONTRACTS_REF: v0.0.18

jobs:
  move:
    name: Move (lint + test)
    runs-on: ubuntu-latest
    steps:
      # Both repos must live as siblings because Move.toml references
      # `local = "../../../world-contracts/contracts/world"`. We restructure
      # the workspace into:
      #   $GITHUB_WORKSPACE/void-exchange       (this repo)
      #   $GITHUB_WORKSPACE/world-contracts     (dependency)
      - name: Checkout void-exchange
        uses: actions/checkout@v4
        with:
          path: void-exchange

      - name: Checkout world-contracts
        uses: actions/checkout@v4
        with:
          repository: evefrontier/world-contracts
          ref: ${{ env.WORLD_CONTRACTS_REF }}
          path: world-contracts

      # Install the pinned `sui` CLI from the official release tarball.
      # We avoid third-party setup actions to keep the supply chain narrow.
      - name: Install Sui CLI
        run: |
          set -euo pipefail
          tarball="sui-${SUI_RELEASE_TAG}-ubuntu-x86_64.tgz"
          curl -fsSL -o "$tarball" \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_RELEASE_TAG}/${tarball}"
          mkdir -p "$HOME/.sui-bin"
          tar -xzf "$tarball" -C "$HOME/.sui-bin"
          echo "$HOME/.sui-bin" >> "$GITHUB_PATH"

      - name: Verify Sui CLI
        run: sui --version

      # Bootstrap ~/.sui/sui_config/client.yaml. The first `sui` subcommand
      # to touch client config prompts interactively, which deadlocks in CI.
      # `yes` accepts the prompt; the generated keypair is unused.
      - name: Bootstrap Sui client config
        run: yes | sui client envs >/dev/null 2>&1 || true

      - name: Move lint
        working-directory: void-exchange
        run: sh scripts/lint-move.sh

      - name: Move test
        working-directory: void-exchange
        run: sh scripts/test-move.sh

  codegen:
    name: Codegen drift
    runs-on: ubuntu-latest
    steps:
      # @mysten/codegen reads the Move source for both packages, so we need
      # the same world-contracts sibling layout as the Move job.
      - name: Checkout void-exchange
        uses: actions/checkout@v4
        with:
          path: void-exchange

      - name: Checkout world-contracts
        uses: actions/checkout@v4
        with:
          repository: evefrontier/world-contracts
          ref: ${{ env.WORLD_CONTRACTS_REF }}
          path: world-contracts

      - name: Install Sui CLI
        run: |
          set -euo pipefail
          tarball="sui-${SUI_RELEASE_TAG}-ubuntu-x86_64.tgz"
          curl -fsSL -o "$tarball" \
            "https://github.com/MystenLabs/sui/releases/download/${SUI_RELEASE_TAG}/${tarball}"
          mkdir -p "$HOME/.sui-bin"
          tar -xzf "$tarball" -C "$HOME/.sui-bin"
          echo "$HOME/.sui-bin" >> "$GITHUB_PATH"

      - name: Bootstrap Sui client config
        run: yes | sui client envs >/dev/null 2>&1 || true

      # `pnpm/action-setup@v4` reads the version from packageManager in
      # package.json. Our package.json lives at void-exchange/, not the
      # action's default cwd ($GITHUB_WORKSPACE), so we point at it
      # explicitly.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: void-exchange/package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: void-exchange/.nvmrc
          cache: pnpm
          cache-dependency-path: void-exchange/pnpm-lock.yaml

      - name: Install workspace deps
        working-directory: void-exchange
        run: pnpm install --frozen-lockfile

      - name: Regenerate bindings
        working-directory: void-exchange
        run: pnpm codegen

      # Fail if the regenerated output differs from what's committed.
      # `git diff --exit-code` returns non-zero on any diff.
      - name: Verify no drift
        working-directory: void-exchange
        run: |
          if ! git diff --exit-code -- ts-scripts/lib/amm/generated; then
            echo "::error::ts-scripts/lib/amm/generated is out of sync with the Move source. Run 'pnpm codegen' locally and commit the result."
            exit 1
          fi

  typescript:
    name: TypeScript (typecheck + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm fmt:check

      - name: Typecheck (root)
        run: pnpm typecheck

      - name: Typecheck (dapp)
        run: pnpm --filter ./dapps exec tsc --noEmit
